<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="assets/css/styles.css?v=67">

</head>
<body>

<main>

    <section class="apply-page">

        <div class="apply-header">
            <a class="apply-brand" href="index.html">
                <img src="assets/images/new_logo.png" alt="Policy Camp logo">
            </a>
            <a class="button button-secondary" href="index.html">Back to event info</a>
        </div>

        <section class="apply-intro">
            <h1 class="faq-page-title">Sessions</h1>
            <p>Policy Camp · 23 July 2026 · UCL, London</p>
        </section>

        <div id="session-container">
            <p class="sessions-loading">Loading sessions…</p>
        </div>

    </section>

</main>

<footer class="site-footer">
    <p>
        <strong>Policy Camp</strong> · 23 July 2026 · UCL, London
    </p>

    <p class="footer-links">
        <a href="https://docs.google.com/document/d/1jeeBf7WfUBtlEaBHmOMwDlNuF64bpwyA/edit" target="_blank" rel="noopener">Code of Conduct</a>
        <span aria-hidden="true"> · </span>
        <a href="https://docs.google.com/document/d/15QjY1yg1Fi6miLH6lhR8HLeekEWgojzf/edit" target="_blank" rel="noopener">Privacy Statement</a>
    </p>
</footer>

<script>
function escHtml(str) {
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

var google = { visualization: { Query: { setResponse: function(response) {
    var container = document.getElementById('session-container');

    if (response.status !== 'ok') {
        container.innerHTML = '<p class="sessions-loading">Sessions coming soon.</p>';
        return;
    }

    var rows = response.table.rows;
    if (!rows || rows.length === 0) {
        container.innerHTML = '<p class="sessions-loading">Sessions coming soon.</p>';
        return;
    }

    function cellVal(row, col) {
        if (!row || !row.c || !row.c[col] || row.c[col] === null || row.c[col].v === null || row.c[col].v === undefined) return '';
        return String(row.c[col].v).trim();
    }

    // Row 0: slot labels in cols 1, 2, 3, …
    var slotLabels = [];
    var headerRow = rows[0];
    for (var c = 1; c < headerRow.c.length; c++) {
        var label = cellVal(headerRow, c);
        if (label) slotLabels.push(label);
    }

    // Build sessions grouped by slot index
    var sessionsBySlot = {};
    for (var s = 0; s < slotLabels.length; s++) sessionsBySlot[s] = [];

    var i = 1;
    while (i < rows.length) {
        if (cellVal(rows[i], 0).toLowerCase() !== 'title') { i++; continue; }

        var titleRow    = rows[i]     || null;
        var ownerRow    = rows[i + 1] || null;
        var locationRow = rows[i + 2] || null;
        var notesRow    = rows[i + 3] || null;
        var location    = cellVal(locationRow, 1);

        for (var col = 0; col < slotLabels.length; col++) {
            var title = cellVal(titleRow, col + 1);
            var owner = cellVal(ownerRow, col + 1);
            var notes = cellVal(notesRow, col + 1);
            if (title) {
                sessionsBySlot[col].push({ title: title, owner: owner, location: location, notes: notes });
            }
        }

        i += 3;
    }

    // Render
    var html = '';
    for (var idx = 0; idx < slotLabels.length; idx++) {
        var sessions = sessionsBySlot[idx] || [];
        var cards = sessions.map(function(s) {
            var notesLink = s.notes
                ? '<a class="session-notes-link" href="' + escHtml(s.notes) + '" target="_blank" rel="noopener">Session notes</a>'
                : '';
            return '<div class="session-card">' +
                '<div class="session-location">' + escHtml(s.location) + '</div>' +
                '<h3 class="session-title">' + escHtml(s.title) + '</h3>' +
                '<div class="session-owner">' + escHtml(s.owner) + '</div>' +
                notesLink +
                '</div>';
        }).join('\n');
        html += '<div class="session-slot">' +
            '<h2 class="slot-header">' + escHtml(slotLabels[idx]) + '</h2>' +
            '<div class="slot-cards">' + cards + '</div>' +
            '</div>\n';
    }
    container.innerHTML = html;
}}}};
</script>
<script async src="https://docs.google.com/spreadsheets/d/1v_aSTs9qBR4ZpcOOK5SKnqrgzenZbYJAf1_lSgbRAbU/gviz/tq?tqx=out:json&headers=0"></script>

</body>
</html>
